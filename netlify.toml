[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: SvelteKit adapter-static writes build/index.html as the SPA shell.
# Serve it for any path that doesn't match a built asset so client-side routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
